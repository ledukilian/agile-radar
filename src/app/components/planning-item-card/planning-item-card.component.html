<div
  #itemElement
  class="planning-item glass-list-item rounded-lg cursor-grab"
  [class.selected]="isSelected"
  [class.target-mode]="isCreatingDependency && !isSelected"
  [class]="overallIndicatorClass"
  [style.left.px]="position?.x"
  [style.top.px]="position?.y"
  [attr.data-estimation-id]="estimation.id"
  (click)="onClick()"
>
  <div class="item-content">
    <!-- Indicateur de status (barre gauche) -->
    <div class="status-bar" [class]="overallIndicatorClass"></div>
    
    <!-- Contenu principal -->
    <div class="item-body">
      <!-- Header : Type + Nom + Menu -->
      <div class="item-header">
        <span class="type-icon">{{ typeIcon }}</span>
        <h4 class="item-name" [title]="estimation.name">{{ estimation.name }}</h4>
        
        <!-- Menu -->
        <div class="item-menu">
          <button 
            (click)="toggleMenu($event)"
            (mousedown)="$event.stopPropagation()"
            class="menu-btn"
            data-no-drag
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
            </svg>
          </button>
          
          <!-- Overlay pour fermer le menu -->
          <div 
            *ngIf="showMenu"
            class="fixed inset-0"
            style="z-index: 9998;"
            (click)="showMenu = false"
          ></div>
          
          <!-- Dropdown menu -->
          <div 
            *ngIf="showMenu"
            class="dropdown-menu absolute right-0 top-full mt-1 w-40 bg-white rounded-lg shadow-xl border border-gray-200 py-1"
            style="z-index: 9999;"
            (mousedown)="$event.stopPropagation()"
            (click)="$event.stopPropagation()"
            data-no-drag
          >
            <button
              (click)="onStartDependency($event)"
              class="w-full px-3 py-2 text-left text-xs text-gray-700 hover:bg-gray-100 flex items-center gap-2"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
              </svg>
              Créer dépendance
            </button>
            <button
              (click)="onRemove($event)"
              class="w-full px-3 py-2 text-left text-xs text-red-600 hover:bg-red-50 flex items-center gap-2"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
              Retirer du board
            </button>
          </div>
        </div>
      </div>

      <!-- Métriques : T-shirt + Points (conditionnées par showMetrics) -->
      <div *ngIf="showMetrics" class="item-metrics">
        <span 
          *ngIf="tShirtSize"
          class="tshirt-badge"
          [ngClass]="[tShirtSize.bgColor, tShirtSize.textColor]"
        >
          {{ tShirtSize.size }}
        </span>
        <span class="points-badge">{{ points }} pts</span>
      </div>
    </div>
  </div>
</div>
