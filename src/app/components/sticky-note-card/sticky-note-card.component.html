<div
  #noteElement
  class="sticky-note-card absolute rounded-lg shadow-lg cursor-move flex flex-col overflow-hidden"
  [ngStyle]="noteStyle"
  [attr.data-x]="note.position.x"
  [attr.data-y]="note.position.y"
  (mousedown)="$event.stopPropagation()"
  (touchstart)="$event.stopPropagation()"
>
  <!-- Header -->
  <div class="sticky-header flex items-center justify-between px-3 py-2 border-b border-black/10">
    <div class="flex-1 min-w-0">
      @if (isEditing) {
        <input
          type="text"
          [(ngModel)]="editableHeader"
          class="w-full bg-transparent border-none outline-none text-sm font-semibold"
          placeholder="Titre..."
        />
      } @else {
        <span class="text-sm font-semibold truncate block" (dblclick)="startEditing()">
          {{ note.header || 'Note' }}
        </span>
      }
    </div>
    
    <!-- Actions -->
    <div class="flex items-center gap-1 ml-2">
      <!-- Color picker toggle -->
      <button
        (click)="toggleColorPicker(); $event.stopPropagation()"
        class="p-1 rounded hover:bg-black/10 transition-colors"
        title="Changer la couleur"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
        </svg>
      </button>
      
      <!-- Delete button -->
      <button
        (click)="onDelete(); $event.stopPropagation()"
        class="p-1 rounded hover:bg-red-500/20 transition-colors"
        title="Supprimer"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
  
  <!-- Color picker dropdown -->
  @if (showColorPicker) {
    <div class="color-picker absolute top-10 right-2 z-50 bg-white rounded-lg shadow-xl p-2 grid grid-cols-4 gap-1">
      @for (color of colors; track color.value) {
        <button
          (click)="selectColor(color); $event.stopPropagation()"
          class="w-6 h-6 rounded-full border-2 transition-transform hover:scale-110"
          [style.backgroundColor]="color.value"
          [style.borderColor]="note.color === color.value ? '#000' : 'transparent'"
          [title]="color.name"
        ></button>
      }
    </div>
  }
  
  <!-- Content -->
  <div class="sticky-content flex-1 px-3 py-2 overflow-hidden" (dblclick)="startEditing()">
    @if (isEditing) {
      <textarea
        [(ngModel)]="editableContent"
        class="w-full h-full bg-transparent border-none outline-none resize-none text-sm"
        placeholder="Écrivez votre note..."
      ></textarea>
    } @else {
      <p class="text-sm whitespace-pre-wrap break-words">{{ note.content }}</p>
    }
  </div>
  
  <!-- Footer -->
  <div class="sticky-footer px-3 py-2 border-t border-black/10">
    @if (isEditing) {
      <div class="flex items-center gap-2">
        <input
          type="text"
          [(ngModel)]="editableFooter"
          class="flex-1 bg-transparent border-none outline-none text-xs"
          placeholder="Auteur..."
        />
        <button
          (click)="saveEditing()"
          class="p-1 rounded bg-green-500/20 hover:bg-green-500/30 transition-colors"
          title="Sauvegarder"
        >
          <svg class="w-4 h-4 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </button>
        <button
          (click)="cancelEditing()"
          class="p-1 rounded bg-red-500/20 hover:bg-red-500/30 transition-colors"
          title="Annuler"
        >
          <svg class="w-4 h-4 text-red-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    } @else {
      <span class="text-xs opacity-70 italic">{{ note.footer || 'Double-cliquez pour éditer' }}</span>
    }
  </div>
  
  <!-- Resize handle -->
  <div class="resize-handle absolute bottom-0 right-0 w-4 h-4 cursor-se-resize">
    <svg class="w-full h-full opacity-30" viewBox="0 0 24 24" fill="currentColor">
      <path d="M22 22H20V20H22V22ZM22 18H20V16H22V18ZM18 22H16V20H18V22ZM22 14H20V12H22V14ZM18 18H16V16H18V18ZM14 22H12V20H14V22Z" />
    </svg>
  </div>
</div>
