<div *ngIf="iteration() as it" class="iteration-form space-y-3" [class.glass-inner]="!embedded" [class.rounded-xl]="!embedded" [class.p-4]="!embedded">
  <!-- ligne titre -->
  <div class="flex items-center gap-2">
    <span *ngIf="index !== undefined" class="text-xs text-glass-muted w-6">#{{ index + 1 }}</span>
    <input class="glass-input rounded-lg px-3 py-1.5 flex-1 text-sm font-medium"
      [ngModel]="it.name" (ngModelChange)="setIterationField('name', $event)" />
    <ng-container *ngIf="showReorder">
      <button (click)="moveUp(it)" class="glass-btn rounded w-8 h-8 flex items-center justify-center" title="Monter">
        <app-icon name="arrow-up" [size]="15"></app-icon>
      </button>
      <button (click)="moveDown(it)" class="glass-btn rounded w-8 h-8 flex items-center justify-center" title="Descendre">
        <app-icon name="arrow-down" [size]="15"></app-icon>
      </button>
    </ng-container>
    <button *ngIf="showDelete" (click)="removeIteration()" class="glass-btn rounded w-8 h-8 flex items-center justify-center" title="Supprimer">
      <app-icon name="trash" [size]="15" color="#ef4444"></app-icon>
    </button>
  </div>

  <!-- dates -->
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-xs text-glass-muted mb-1">Début</label>
      <input type="date" class="glass-input rounded-lg px-2 py-1.5 w-full text-sm"
        [ngModel]="it.startDate" (ngModelChange)="setIterationField('startDate', $event)" />
    </div>
    <div>
      <label class="block text-xs text-glass-muted mb-1">Fin</label>
      <input type="date" class="glass-input rounded-lg px-2 py-1.5 w-full text-sm"
        [ngModel]="it.endDate" (ngModelChange)="setIterationField('endDate', $event)" />
    </div>
  </div>

  <!-- capacité -->
  <div class="grid grid-cols-3 gap-2">
    <div>
      <label class="block text-xs text-glass-muted mb-1">Jours-homme équipe</label>
      <input type="number" min="0" step="0.5" class="glass-input rounded-lg px-2 py-1.5 w-full text-sm"
        [ngModel]="teamManDays(it)" (ngModelChange)="setTeamManDays($event)" />
    </div>
    <div>
      <label class="block text-xs text-glass-muted mb-1">Focus (0-1)</label>
      <input type="number" min="0" max="1" step="0.05" class="glass-input rounded-lg px-2 py-1.5 w-full text-sm"
        [ngModel]="it.capacity.focusFactor" (ngModelChange)="setCapacityField('focusFactor', $event)" />
    </div>
    <div>
      <label class="block text-xs text-glass-muted mb-1">Pts/j-h</label>
      <input type="number" min="0" step="0.1" class="glass-input rounded-lg px-2 py-1.5 w-full text-sm"
        [ngModel]="it.capacity.pointsPerManDay" (ngModelChange)="setCapacityField('pointsPerManDay', $event)" />
    </div>
  </div>

  <!-- capacité calculée + override -->
  <div class="flex items-center gap-3 flex-wrap">
    <span class="text-xs px-2 py-1 rounded-lg glass-card text-glass-secondary">
      Capacité : <strong class="text-glass-primary">{{ formatPoints(capacityPoints(it)) }}</strong> pts
    </span>
    <span class="text-xs px-2 py-1 rounded-lg glass-card text-glass-secondary">
      Réserves : {{ formatPoints(reservedPoints(it)) }} pts
    </span>
    <span class="text-xs px-2 py-1 rounded-lg glass-card text-glass-secondary">
      Nette : <strong style="color:#22c55e">{{ formatPoints(netCapacityPoints(it)) }}</strong> pts
    </span>
    <label class="text-xs text-glass-muted ml-auto flex items-center gap-2">
      Override direct
      <input type="number" min="0" placeholder="—" class="glass-input rounded px-2 py-1 w-20 text-sm"
        [ngModel]="it.capacity.manualPoints" (ngModelChange)="setManualPoints($event)" />
    </label>
  </div>

  <!-- passé / recalibrage -->
  <div class="flex items-center gap-3 flex-wrap border-t glass-divider pt-2">
    <label class="text-xs text-glass-secondary flex items-center gap-2">
      <input type="checkbox" [checked]="it.isPast" (change)="togglePast(it)" />
      Itération passée
    </label>
    <label *ngIf="it.isPast" class="text-xs text-glass-muted flex items-center gap-2">
      Vélocité réalisée (pts)
      <input type="number" min="0" class="glass-input rounded px-2 py-1 w-24 text-sm"
        [ngModel]="it.actualVelocity" (ngModelChange)="setActualVelocity($event)" />
    </label>
    <span *ngIf="it.isPast && observedRatio(it) > 0" class="text-xs text-glass-muted">
      → {{ observedRatio(it) | number:'1.0-2' }} pts/j-h observés
    </span>
  </div>

  <!-- réserves -->
  <div class="border-t glass-divider pt-2 space-y-2">
    <div class="flex items-center justify-between">
      <span class="text-xs font-medium text-glass-secondary">Réserves (bandes passantes)</span>
      <button (click)="addReserve()" class="glass-btn rounded px-2 py-1 text-xs">+ Réserve</button>
    </div>
    <div *ngFor="let r of it.reserves; trackBy: trackReserve" class="flex items-center gap-2">
      <app-color-picker [value]="r.color"
        (valueChange)="updateReserveField(r.id, 'color', $event)"></app-color-picker>
      <input class="glass-input rounded px-2 py-1 flex-1 text-sm" placeholder="Libellé"
        [ngModel]="r.label" (ngModelChange)="updateReserveField(r.id, 'label', $event)" />
      <div class="w-20 shrink-0">
        <app-select [options]="reserveModeOptions" [value]="r.mode" [dense]="true"
          (valueChange)="updateReserveField(r.id, 'mode', $event)"></app-select>
      </div>
      <input type="number" min="0" class="glass-input rounded px-2 py-1 w-20 text-sm"
        [ngModel]="r.value" (ngModelChange)="updateReserveField(r.id, 'value', $event)" />
      <button (click)="removeReserve(r.id)" class="glass-btn rounded w-8 h-8 flex items-center justify-center shrink-0">
        <app-icon name="close" [size]="13"></app-icon>
      </button>
    </div>
  </div>
</div>
