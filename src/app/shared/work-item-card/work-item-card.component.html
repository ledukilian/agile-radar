<div
  class="work-item-card rounded-lg px-2 py-1.5 cursor-grab select-none flex flex-col gap-0.5"
  [class.is-child]="depth > 0"
  [style.borderLeftColor]="meta.color"
  draggable="true"
  (dragstart)="onDragStart($event)"
  (dragend)="onDragEnd()"
  (dblclick)="onDblClick()"
  [title]="'Double-clic pour éditer'"
>
  <!-- Ligne titre : icône type + titre | points -->
  <div class="card-title-row flex items-center gap-1 min-h-0">
    <span *ngIf="depth > 0" class="tree-marker text-glass-muted" aria-hidden="true">└</span>
    <app-icon class="type-icon shrink-0" [name]="meta.icon" [color]="meta.color" [size]="12"></app-icon>
    <span class="title flex-1 min-w-0 text-xs font-semibold text-glass-primary truncate leading-tight">{{ item.title }}</span>
    <span class="pts-value shrink-0 text-[10px] font-bold text-glass-secondary leading-none">{{ effectivePoints }} pts</span>
    <app-icon *ngIf="hasWarning" class="shrink-0" name="alert-triangle" [size]="13" color="#f59e0b" [title]="warningText"></app-icon>
  </div>

  <!-- Ligne méta : Jira à gauche, badges à droite -->
  <div *ngIf="jiraTicketKey || hasChildren || depCount > 0 || landingLabel"
    class="card-meta-row flex items-center gap-1 min-h-0 leading-none">
    <div class="meta-left min-w-0">
      <span *ngIf="jiraTicketKey" class="jira-pill text-[9px] font-semibold cursor-pointer"
        (click)="onJiraClick($event)" [title]="item.jiraUrl ?? ''">
        {{ jiraTicketKey }}
      </span>
    </div>
    <div class="meta-right ml-auto flex items-center gap-0.5 flex-wrap justify-end">
      <span *ngIf="hasChildren" class="meta-chip text-[9px] px-1 py-px rounded glass-card text-glass-muted">
        {{ childCount }} enfant(s) · roll-up
      </span>
      <span *ngIf="depCount > 0" class="meta-chip inline-flex items-center gap-0.5 text-[9px] px-1 py-px rounded glass-card"
        [class.landing-warn]="depViolation" [style.color]="depViolation ? '' : 'var(--text-muted)'"
        title="Dépendances">
        <app-icon name="link" [size]="9"></app-icon> {{ depCount }}
      </span>
      <span *ngIf="landingLabel" class="landing-badge inline-flex items-center gap-0.5 text-[9px] px-1 py-px rounded"
        [class.landing-ok]="!hasWarning" [class.landing-warn]="hasWarning">
        <app-icon name="flag" [size]="9"></app-icon> {{ landingLabel }}
      </span>
    </div>
  </div>
</div>
