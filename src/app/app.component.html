<div class="app-shell app-background light-mode h-screen relative overflow-hidden">
  <app-workspace class="workspace-host"
    (openItem)="openItem($event)" (openSetup)="openSetup()"
    (openIterationSettings)="openIterationSettings($event)"></app-workspace>

  <!-- Top bar flottante -->
  <header class="topbar flex items-center gap-3 px-4 h-14">
    <div class="flex items-center gap-2.5">
      <span class="brand-badge"><app-icon name="radar" [size]="18" color="#ffffff"></app-icon></span>
      <div class="flex flex-col leading-none">
        <span class="brand-title">Agile Radar</span>
        <span class="brand-version">v{{ version }}</span>
      </div>
    </div>

    <div class="topbar-divider"></div>

    <button (click)="openSetup()" data-tour="config" class="topbar-btn rounded-lg w-9 h-9 flex items-center justify-center" title="Configuration">
      <app-icon name="settings" [size]="16"></app-icon>
    </button>

    <input class="topbar-input px-3 py-1.5 text-sm w-64 rounded-lg"
      [ngModel]="projectName()" (ngModelChange)="store.setProjectName($event)" placeholder="Nom du projet" />

    <button (click)="startTour()" class="topbar-btn rounded-lg w-9 h-9 flex items-center justify-center" title="Visite guidée">
      <app-icon name="help" [size]="16"></app-icon>
    </button>

    <!-- Menu Données -->
    <div class="data-menu">
      <button (click)="toggleDataMenu()" class="topbar-btn rounded-lg w-9 h-9 flex items-center justify-center"
        [class.topbar-btn-on]="showDataMenu()" title="Importer / exporter">
        <app-icon name="save" [size]="16"></app-icon>
      </button>
      <ng-container *ngIf="showDataMenu()">
        <div class="data-menu-backdrop" (click)="closeDataMenu()"></div>
        <div class="data-menu-panel">
          <label class="data-menu-item cursor-pointer">
            <app-icon name="download" [size]="16" class="data-menu-icon"></app-icon> Importer…
            <input type="file" accept="application/json" class="hidden"
              (change)="onImportFile($event); closeDataMenu()" />
          </label>
          <button (click)="exportProject(); closeDataMenu()" class="data-menu-item">
            <app-icon name="upload" [size]="16" class="data-menu-icon"></app-icon> Exporter
          </button>
          <div class="data-menu-sep"></div>
          <button (click)="deleteAll()" class="data-menu-item data-menu-item-danger">
            <app-icon name="trash" [size]="16" class="data-menu-icon"></app-icon> Tout supprimer
          </button>
        </div>
      </ng-container>
    </div>

    <div class="ml-auto flex items-center gap-2">
      <button (click)="toggleInsights()" class="topbar-btn rounded-lg px-3 py-1.5 text-sm inline-flex items-center gap-1.5"
        [class.topbar-btn-on]="showInsights()">
        <app-icon name="lightbulb" [size]="15"></app-icon> Insights
      </button>
    </div>
  </header>

  <aside *ngIf="showInsights()" data-tour="insights" class="insights-col">
    <app-insights-panel (openItem)="openItem($event)"></app-insights-panel>
  </aside>

  <!-- Modales -->
  <app-setup *ngIf="showSetup()" (close)="closeSetup()"></app-setup>
  <app-iteration-settings *ngIf="selectedIterationId() as id" [iterationId]="id"
    (close)="closeIterationSettings()"></app-iteration-settings>
  <app-item-detail *ngIf="selectedItemId() as id" [itemId]="id"
    (close)="closeItem()" (openItem)="openItem($event)"></app-item-detail>
</div>
